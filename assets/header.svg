<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Talha Demir profile header</title>
  <desc id="desc">Dark technical banner for systems, AI, HPC, quant, and hardware-aware software.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#07111F"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="300" x2="1080" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/>
      <stop offset="0.45" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 92) rotate(137) scale(460 330)">
      <stop stop-color="#2563EB" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#0F172A" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#1E293B" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)" opacity="0.55"/>
  <rect width="1200" height="360" rx="28" fill="url(#glow)"/>

  <g opacity="0.7">
    <path d="M92 264H278L352 190H478L544 124H707" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
    <path d="M688 124H818L882 188H1048" stroke="url(#line)" stroke-width="3" stroke-linecap="round" opacity="0.72"/>
    <circle cx="92" cy="264" r="6" fill="#14B8A6"/>
    <circle cx="278" cy="264" r="6" fill="#14B8A6"/>
    <circle cx="352" cy="190" r="6" fill="#38BDF8"/>
    <circle cx="478" cy="190" r="6" fill="#38BDF8"/>
    <circle cx="544" cy="124" r="6" fill="#60A5FA"/>
    <circle cx="707" cy="124" r="6" fill="#A78BFA"/>
    <circle cx="882" cy="188" r="6" fill="#A78BFA"/>
    <circle cx="1048" cy="188" r="6" fill="#A78BFA"/>
  </g>

  <g opacity="0.9">
    <rect x="824" y="58" width="304" height="196" rx="18" fill="#020617" fill-opacity="0.72" stroke="#334155"/>
    <text x="850" y="92" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">runtime.trace</text>
    <text x="850" y="126" fill="#5EEAD4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">latency  : measured</text>
    <text x="850" y="154" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">models   : probed</text>
    <text x="850" y="182" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">hardware : constrained</text>
    <text x="850" y="214" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">status   : building</text>
  </g>

  <g filter="url(#soft)" opacity="0.65">
    <circle cx="280" cy="114" r="58" fill="#0EA5E9" fill-opacity="0.16"/>
    <circle cx="474" cy="252" r="62" fill="#14B8A6" fill-opacity="0.13"/>
    <circle cx="774" cy="92" r="48" fill="#8B5CF6" fill-opacity="0.14"/>
  </g>

  <text x="74" y="116" fill="#E5E7EB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="740" letter-spacing="0">Talha Demir</text>
  <text x="78" y="160" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">systems · AI · HPC · quant · hardware-aware software</text>

  <g transform="translate(76 198)">
    <rect x="0" y="0" width="132" height="34" rx="17" fill="#0F766E" fill-opacity="0.22" stroke="#14B8A6" stroke-opacity="0.6"/>
    <text x="19" y="23" fill="#99F6E4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">C/C++</text>
    <rect x="148" y="0" width="154" height="34" rx="17" fill="#1D4ED8" fill-opacity="0.18" stroke="#60A5FA" stroke-opacity="0.58"/>
    <text x="168" y="23" fill="#BFDBFE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">PyTorch</text>
    <rect x="318" y="0" width="150" height="34" rx="17" fill="#7C3AED" fill-opacity="0.16" stroke="#A78BFA" stroke-opacity="0.58"/>
    <text x="338" y="23" fill="#DDD6FE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">CUDA / FPGA</text>
    <rect x="484" y="0" width="160" height="34" rx="17" fill="#334155" fill-opacity="0.24" stroke="#94A3B8" stroke-opacity="0.46"/>
    <text x="504" y="23" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">market data</text>
  </g>
</svg>
